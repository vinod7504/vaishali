<!doctype html>
<html lang="te">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>హోటల్ వైశాలి | మెనూ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Telugu:wght@400;500;600;700;800&family=Noto+Sans+Telugu:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <nav class="topbar" aria-label="ప్రధాన సమాచారం">
          <span id="brandMark" class="brand-mark" aria-hidden="true">వై</span>
          <span class="topbar-label">స్వాగతం</span>
        </nav>
        <div class="hero-content">
          <p id="heroKicker" class="hero-kicker">శుచి • రుచి • నాణ్యత</p>
          <h1 id="heroTitle">హోటల్ వైశాలి</h1>
          <p id="tagline" class="tagline">రుచికరమైన ఆహారం • సరసమైన ధరలు</p>
          <div class="language-options" aria-label="Language options">
            <button class="language-option" type="button" data-language="en">English</button>
            <button class="language-option active" type="button" data-language="te">తెలుగు</button>
          </div>
          <a id="menuLink" class="menu-link" href="#menu">మెనూ చూడండి</a>
        </div>
        <div class="hero-pattern" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </header>

      <main id="menu" class="menu-area">
        <section class="search-panel" aria-label="వంటకాల శోధన">
          <div class="section-heading compact">
            <p id="menuEyebrow">ఈ రోజు మెనూ</p>
            <h2 id="menuHeading">మీకు నచ్చిన రుచి ఎంచుకోండి</h2>
          </div>
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="searchInput" type="search" placeholder="వంటకం వెతకండి" aria-label="వంటకం వెతకండి" autocomplete="off">
          </label>
          <div id="filters" class="filter-row" aria-label="వర్గాలు"></div>
        </section>

        <section id="featuredSection" class="featured" aria-labelledby="featuredTitle">
          <div class="section-heading">
            <p id="featuredEyebrow">మా ప్రత్యేకత</p>
            <h2 id="featuredTitle">ప్రత్యేక వంటకాలు</h2>
          </div>
          <div id="featuredGrid" class="featured-grid"></div>
        </section>

        <section class="all-menu" aria-labelledby="allMenuTitle">
          <div class="section-heading">
            <p id="allMenuEyebrow">తాజాగా వడ్డించబడును</p>
            <h2 id="allMenuTitle">పూర్తి మెనూ</h2>
          </div>
          <p id="resultsText" class="results-text" aria-live="polite"></p>
          <div id="menuSections" class="menu-sections"></div>
          <div id="emptyState" class="empty-state" hidden>
            <p id="emptyMessage">ఈ పేరుతో వంటకం కనిపించలేదు</p>
            <button id="clearSearch" type="button">అన్నీ చూపించండి</button>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p id="footerTitle" class="footer-title">హోటల్ వైశాలి</p>
        <p id="footerLineOne">శుచి మరియు రుచి మా ప్రత్యేకత</p>
        <p id="footerLineTwo">మీ రాకకు ధన్యవాదాలు</p>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
